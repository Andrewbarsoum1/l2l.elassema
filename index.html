  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 900px;
      margin: auto;
      padding: 20px;
      background-color: #f9f9f9;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    select,
    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 16px;
    }

    .select2-container {
      width: 100% !important;
    }

    .select2-selection--multiple {
      min-height: 44px;
      padding: 4px 8px;
      font-size: 16px;
      border-radius: 4px;
    }

    .select2-selection__choice {
      background-color: #007BFF;
      color: white;
      font-size: 14px;
      padding: 2px 6px;
      border-radius: 3px;
    }

    .select2-selection__choice__remove {
      color: white !important;
      margin-right: 6px;
      font-weight: bold;
      cursor: pointer;
      display: inline !important;
    }

    .select2-selection__choice__remove:hover {
      color: #ffcccc !important;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 4px;
      margin-right: 10px;
    }

    button:hover {
      background-color: #0056b3;
    }

    table {
      width: 100%;
      margin-top: 30px;
      border-collapse: collapse;
    }

    th,
    td {
      border: 1px solid #aaa;
      padding: 10px;
      text-align: left;
    }

    .actions button {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 4px 8px;
    }

    .actions button:hover {
      color: #007BFF;
    }
  </style>
</head>

    function addPatient() {
      const name = document.getElementById("name").value.trim();
      const age = document.getElementById("age").value;
      const selectedTests = $('#tests').select2('data');
      lastSelectedTestValues = $('#tests').val();
      if (!name || !age || selectedTests.length === 0) {
        alert("Please complete all fields and select at least one test.");
        return;
      }
      const testNames = selectedTests.map(item => item.text);
      const totalPrice = selectedTests.reduce((sum, item) => {
        const parts = item.text.split('-');
        const priceText = parts[parts.length - 1].trim();
        const price = parseFloat(priceText) || 0;
        return sum + price;
      }, 0);
      const table = document.querySelector("#patientTable tbody");
      const row = table.insertRow();
      row.insertCell(0).textContent = ++count;
      row.insertCell(1).textContent = name;
      row.insertCell(2).textContent = age;
      row.insertCell(3).textContent = testNames.join(', ');
      row.insertCell(4).textContent = totalPrice.toFixed(2);
      const cell = row.insertCell(5);
      cell.innerHTML = `
        <button class="actions" onclick="editPatient(this)">✏️</button>
        <button class="actions" onclick="deletePatient(this)">🗑️</button>
      `;
      grandTotal += totalPrice;
      document.getElementById("grandTotal").textContent = grandTotal.toFixed(2);
      document.getElementById("name").value = "";
      document.getElementById("age").value = "";
      $('#tests').val(null).trigger('change');

      saveToLocalStorage();
    }


    function saveToLocalStorage() {
      const table = document.querySelector("#patientTable tbody");
      const patients = [];
      for (let i = 0; i < table.rows.length; i++) {
        const row = table.rows[i];
        patients.push({
          name: row.cells[1].textContent,
          age: row.cells[2].textContent,
          tests: row.cells[3].textContent,
          price: row.cells[4].textContent
        });
      }

      // Save data and current date/time to handle expiration
      // We only update the date key if it's not set, or we can just rely on checking valid date on load.
      // But user requirement: "expired after 12 am (new day)"
      // Meaning if I save today, and open tomorrow, it should be gone.
      // So we store the date string YYYY-MM-DD of when the data was created/modified.

      // Actually, user said "new day". So simply storing the current date string (YYYY-MM-DD) 
      // and comparing it on load is sufficient.

      const today = new Date().toISOString().split('T')[0];

      localStorage.setItem(LS_KEY, JSON.stringify(patients));
      localStorage.setItem(LS_DATE_KEY, today);
    }

    function checkAndLoadLocalStorage() {
      const storedDate = localStorage.getItem(LS_DATE_KEY);
      const today = new Date().toISOString().split('T')[0];

      if (storedDate && storedDate !== today) {
        // Expired (new day)
        console.log("Data expired. Clearing local storage.");
        localStorage.removeItem(LS_KEY);
        localStorage.removeItem(LS_DATE_KEY);
        return;
      }

      const storedData = localStorage.getItem(LS_KEY);
      if (storedData) {
        const patients = JSON.parse(storedData);
        const table = document.querySelector("#patientTable tbody");

        patients.forEach(p => {
          const row = table.insertRow();
          row.insertCell(0).textContent = ++count;
          row.insertCell(1).textContent = p.name;
          row.insertCell(2).textContent = p.age;
          row.insertCell(3).textContent = p.tests;
          row.insertCell(4).textContent = p.price;
          const cell = row.insertCell(5);
          cell.innerHTML = `
                    <button class="actions" onclick="editPatient(this)">✏️</button>
                    <button class="actions" onclick="deletePatient(this)">🗑️</button>
                `;
          grandTotal += parseFloat(p.price) || 0;
        });
        document.getElementById("grandTotal").textContent = grandTotal.toFixed(2);
      }
    }

    function useSameTests() {
      if (lastSelectedTestValues.length === 0) {
        alert("No previous patient test data found.");
        return;
      }
      $('#tests').val(lastSelectedTestValues).trigger('change');
    }

    function editPatient(btn) {
      const row = btn.closest("tr");
      const cells = row.cells;
      const name = cells[1].textContent;
      const age = cells[2].textContent;
      const tests = cells[3].textContent;
      document.getElementById("name").value = name;
      document.getElementById("age").value = age;
      const options = [...document.querySelectorAll('#tests option')];
      const selectedValues = tests.split(', ').map(testName =>
        options.find(opt => opt.textContent === testName)?.value
      ).filter(Boolean);
      $('#tests').val(selectedValues).trigger('change');
      lastSelectedTestValues = selectedValues;
      deletePatient(btn);
    }

    function deletePatient(btn) {
      const row = btn.closest("tr");
      const deletedPrice = parseFloat(row.cells[4].textContent);
      row.remove();
      grandTotal -= deletedPrice;
      document.getElementById("grandTotal").textContent = grandTotal.toFixed(2);
      const table = document.querySelector("#patientTable tbody");
      for (let i = 0; i < table.rows.length; i++) {
        table.rows[i].cells[0].textContent = i + 1;
      }
      count = table.rows.length;
      saveToLocalStorage();
    }

            <body>
                <div class="report-header">
                <div style="text-align: center;">
                    <img src="data:image/png;base64,` + labLogoBase64 + `" alt="Lab Logo" style="width: 300px; height: auto; ">
                  <p>Date: ${formattedDate}</p>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Patient Name</th>
                            <th>Age</th>
                            <th>Medical Tests</th>
                        </tr>
                    </thead>
                    <tbody>
    `;

      const table = document.querySelector("#patientTable tbody");
      for (let i = 0; i < table.rows.length; i++) {
        const cells = table.rows[i].cells;
        const patientName = cells[1].textContent;
        const patientAge = cells[2].textContent;
        const testsWithPrices = cells[3].textContent;
        const testsArray = testsWithPrices.split(', ').map(test => {
          const parts = test.split('-');
          return parts[0].trim();
        }).map(testName => `• ${testName}`);
        const formattedTests = testsArray.join('<br>');
        html += `<tr>
            <td>${i + 1}</td>
            <td>${patientName}</td>
            <td>${patientAge}</td>
            <td>${formattedTests}</td>
        </tr>`;
      }

      html += `
                    </tbody>
                </table>
            </body>
        </html>`;

      const blob = htmlDocx.asBlob(html);
      const reportFileName = 'Lab_Patient_Report_' + today.toISOString().split('T')[0] + '.docx';
      saveAs(blob, reportFileName);
    }
  </script>
